<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Khung hiển thị ảnh lớn - Giữ nguyên ID 'image' theo đúng đề bài -->
    <div id="image">
        Di chuột qua một hình ảnh bên dưới để hiển thị ở đây.
    </div>

    <!-- Khu vực các ảnh nhỏ (Sử dụng đúng các sự kiện onmouseover và onmouseout) -->
    <div class="gallery">
        <img class="preview" 
             src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=500" 
             alt="Phong cảnh núi non và hồ nước hùng vĩ" 
             onmouseover="upDate(this)" 
             onmouseout="undo()">

        <img class="preview" 
             src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500" 
             alt="Cánh đồng sương mù lúc bình minh" 
             onmouseover="upDate(this)" 
             onmouseout="undo()">

        <img class="preview" 
             src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=500" 
             alt="Con đường gỗ đi xuyên qua rừng cây xanh" 
             onmouseover="upDate(this)" 
             onmouseout="undo()">
    </div>

    <!-- Nhúng file script ở cuối thẻ body để tránh lỗi load DOM -->
    <script src="script.js"></script>
</body>
</html>
